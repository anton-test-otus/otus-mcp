services:
  notes-knowledge:
    build: .
    container_name: notes-knowledge
    ports:
      - "8080:8080"
    environment:
      NOTES_MCP_DATA_DIR: /app/data
      NOTES_MCP_HOST: 0.0.0.0
      NOTES_MCP_PORT: "8080"
      NOTES_MCP_PUBLIC_URL: http://localhost:8080
      NOTES_MCP_OCR_LANG: rus+eng
    volumes:
      - notes-data:/app/data
    restart: unless-stopped

volumes:
  notes-data:
